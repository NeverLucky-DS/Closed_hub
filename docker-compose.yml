services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: closedhub
      POSTGRES_PASSWORD: closedhub
      POSTGRES_DB: closedhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U closedhub -d closedhub"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # В контейнере localhost — это сам бот; Postgres — сервис postgres в сети compose.
      DATABASE_URL: postgresql://closedhub:closedhub@postgres:5432/closedhub
      # Ключ Google: в образ не попадает (.dockerignore). Путь внутри контейнера — всегда этот файл.
      GOOGLE_SERVICE_ACCOUNT_JSON_PATH: /app/secrets/google-service-account.json
    volumes:
      - ./storage:/app/storage
      # Слева — файл на хосте (задай GOOGLE_SERVICE_ACCOUNT_JSON_HOST в .env, если имя другое)
      - ${GOOGLE_SERVICE_ACCOUNT_JSON_HOST:-./closeml-fc7387cd4ce5.json}:/app/secrets/google-service-account.json:ro
    restart: unless-stopped

  web:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://closedhub:closedhub@postgres:5432/closedhub
    volumes:
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    command: ["uv", "run", "--no-sync", "python", "-m", "web.main"]
    restart: unless-stopped

volumes:
  pgdata:
