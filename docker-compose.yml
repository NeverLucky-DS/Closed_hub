services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: closedhub
      POSTGRES_PASSWORD: closedhub
      POSTGRES_DB: closedhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  bot:
    build: .
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

volumes:
  pgdata:
