{% extends "base.html" %}
{% import "_icons.html" as icon %}
{% block main %}
<a href="/hackathons" class="inline-flex items-center gap-1 text-sm text-ink-300 hover:text-ink-100 mb-5">
  <span class="rotate-180">{{ icon.chevron_right() }}</span> К списку
</a>

<header class="mb-6">
  <h1 class="text-2xl font-semibold tracking-tight">Новая команда</h1>
  <p class="mt-1 text-sm text-ink-300">Ты будешь капитаном: примешь или отклонишь заявки. Себя в счёт места мы уже заложили.</p>
</header>

{% if error %}
<div class="mb-4 rounded-xl border border-rose-500/40 bg-rose-500/10 px-4 py-3 text-sm text-rose-200">{{ error }}</div>
{% endif %}

<form method="post" action="/hackathons/create" class="card p-6 max-w-xl space-y-4">
  <div>
    <label class="block text-sm text-ink-200">Название</label>
    <input name="title" required maxlength="200" class="field mt-1.5 w-full" placeholder="Например: ML-хакатон, команда Альфа">
  </div>
  <div>
    <label class="block text-sm text-ink-200">Описание</label>
    <textarea name="description" rows="4" maxlength="8000" class="field mt-1.5 w-full resize-y" placeholder="Стек, роли, ожидания…"></textarea>
  </div>
  <div class="grid sm:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm text-ink-200">Дата начала (необязательно)</label>
      <input type="date" name="starts_at" class="field mt-1.5 w-full">
    </div>
    <div>
      <label class="block text-sm text-ink-200">Дата окончания (необязательно)</label>
      <input type="date" name="ends_at" class="field mt-1.5 w-full">
    </div>
  </div>
  <div>
    <label class="block text-sm text-ink-200">Человек в команде (включая тебя)</label>
    <input type="number" name="max_members" value="4" min="2" max="30" required class="field mt-1.5 w-full max-w-[12rem]">
  </div>
  <button type="submit" class="btn btn-primary">Создать</button>
</form>
{% endblock %}
